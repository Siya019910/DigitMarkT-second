<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DigitMarkT — Home</title>
  <style>
    /* Reuse your variables and header styles here */
    :root {
      --accent-green: #00e676; --accent-teal: #00bcd4; --bg-dark: #020c1b;
      --bg-card: rgba(10, 25, 47, 0.7); --text-primary: #e6f1ff;
      --text-muted: #8892b0; --border: rgba(0, 230, 118, 0.2); --header-height: 70px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: var(--bg-dark); color: var(--text-primary); font-family: 'Inter', sans-serif; }
    header { height: var(--header-height); display: flex; justify-content: space-between; align-items: center; padding: 0 5%; background: rgba(2, 12, 27, 0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; }
    .logo { font-size: 1.5rem; text-decoration: none; color: white; font-weight: bold; }
    .logo span { color: var(--accent-green); }
    nav { display: flex; gap: 2rem; }
    nav a { text-decoration: none; color: var(--text-muted); transition: 0.3s; }
    nav a:hover, nav a[aria-current="page"] { color: var(--accent-green); }
    .hero { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 5%; }
    h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); line-height: 1.1; }
    h1 span { color: var(--accent-green); }
    footer { padding: 3rem; text-align: center; color: var(--text-muted); border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">Digit<span>Mark</span>T</a>
    <nav>
      <a href="index.html" aria-current="page">Home</a>
      <a href="services.html">Services</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>
  <section class="hero">
    <h1>Innovating the<br><span>Digital Space</span></h1>
  </section>
  <footer>&copy; 2025 <strong>DigitMarkT</strong></footer>
</body>
</html>
