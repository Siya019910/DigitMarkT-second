<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DigitMarkT — Contact</title>
  <meta name="description" content="Get in touch with DigitMarkT to start your next digital project." />
  
  <style>
    /* ── Variables & Global (Matches Index) ── */
    :root {
      --accent-green: #00e676;
      --accent-teal: #00bcd4;
      --bg-dark: #020c1b;
      --bg-card: rgba(10, 25, 47, 0.7);
      --text-primary: #e6f1ff;
      --text-muted: #8892b0;
      --border: rgba(0, 230, 118, 0.2);
      --header-height: 70px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      height: var(--header-height);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 5%;
      background: rgba(2, 12, 27, 0.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo { font-size: 1.5rem; text-decoration: none; color: white; font-weight: bold; }
    .logo span { color: var(--accent-green); }
    nav { display: flex; gap: 2rem; }
    nav a { text-decoration: none; color: var(--text-muted); transition: 0.3s; }
    nav a:hover, nav a[aria-current="page"] { color: var(--accent-green); }

    /* ── Contact Layout ── */
    .contact-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 4rem 5%;
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 4rem;
    }

    .contact-info h2 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      margin-bottom: 1rem;
      line-height: 1.1;
    }

    .contact-info h2 span { color: var(--accent-green); }

    .intro {
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      font-size: 1.1rem;
    }

    .info-items { display: flex; flex-direction: column; gap: 1.5rem; }

    .info-item { display: flex; align-items: flex-start; gap: 1rem; }

    .info-icon {
      width: 44px;
      height: 44px;
      background: rgba(0, 230, 118, 0.1);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .info-text .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: var(--accent-teal);
      letter-spacing: 1px;
      display: block;
    }

    .info-text a, .info-text span {
      text-decoration: none;
      color: var(--text-primary);
      transition: 0.3s;
    }

    .info-text a:hover { color: var(--accent-green); }

    /* ── Form Card ── */
    .contact-form-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      backdrop-filter: blur(12px);
    }

    .contact-form { display: flex; flex-direction: column; gap: 1.5rem; }

    .field { display: flex; flex-direction: column; gap: 0.5rem; }

    .field label { font-size: 0.85rem; color: var(--accent-teal); }

    input, textarea {
      background: rgba(2, 12, 27, 0.5);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.8rem 1rem;
      color: white;
      font-family: inherit;
      transition: 0.3s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent-green);
      box-shadow: 0 0 10px rgba(0, 230, 118, 0.1);
    }

    textarea { min-height: 120px; resize: vertical; }

    .submit-btn {
      background: var(--accent-green);
      color: var(--bg-dark);
      padding: 1rem;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      font-size: 1rem;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 230, 118, 0.3);
    }

    /* ── Responsive ── */
    @media (max-width: 860px) {
      .contact-wrapper { grid-template-columns: 1fr; gap: 3rem; }
      nav { display: none; }
      .contact-info { text-align: center; }
      .info-item { justify-content: center; text-align: left; }
    }

    footer {
        padding: 3rem;
        text-align: center;
        color: var(--text-muted);
        border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo">Digit<span>Mark</span>T</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="contact.html" aria-current="page">Contact</a>
    </nav>
  </header>

  <div class="contact-wrapper">
    <!-- Left: Info -->
    <div class="contact-info">
      <h2 class="section-title">Let's Build<br /><span>Together</span></h2>
      <p class="intro">
        Have a project in mind? Reach out and I'll get back to you within 24 hours.
      </p>

      <div class="info-items">
        <div class="info-item">
          <div class="info-icon">📍</div>
          <div class="info-text">
            <span class="label">Location</span>
            <span>Katlehong, Gauteng</span>
          </div>
        </div>
        <div class="info-item">
          <div class="info-icon">💬</div>
          <div class="info-text">
            <span class="label">WhatsApp</span>
            <a href="https://wa.me/27642122136" target="_blank">064 212 2136</a>
          </div>
        </div>
        <div class="info-item">
          <div class="info-icon">✉️</div>
          <div class="info-text">
            <span class="label">Email</span>
            <a href="mailto:siyabongathomo.tpy@gmail.com">siyabongathomo.tpy@gmail.com</a>
          </div>
        </div>
      </div>
    </div>

    <!-- Right: Form -->
    <div class="contact-form-card">
      <form class="contact-form">
        <div class="field">
          <label>Full Name</label>
          <input type="text" placeholder="Siyabonga Thomo" required />
        </div>
        <div class="field">
          <label>Email Address</label>
          <input type="email" placeholder="your@email.com" required />
        </div>
        <div class="field">
          <label>Subject</label>
          <input type="text" placeholder="Project Inquiry" />
        </div>
        <div class="field">
          <label>Message</label>
          <textarea placeholder="Tell me about your project..."></textarea>
        </div>
        <button type="submit" class="submit-btn">Send Message →</button>
      </form>
    </div>
  </div>

  <footer>
    &copy; 2025 <strong>DigitMarkT</strong>
  </footer>

</body>
</html>
